# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: Arkadii-Redozubov-personal/art-beton-project
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/85b7443f-1352-4806-ad5f-3d3560d5f647/pkce
  auth_token_endpoint: /sites/85b7443f-1352-4806-ad5f-3d3560d5f647/token
  gateway_url: https://gateway.decapbridge.com
  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge
# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url
# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg
# Add site links in Decap CMS (optional)
site_url: https://art-concrete.netlify.app

# Изображения при загрузке кладутся в /images, ссылки в JSON — вида "images/файл.jpg"
media_folder: "images"
public_folder: "images"

collections:
  - name: "gallery"
    label: "Галерея"
    files:
      - name: "gallery"
        label: "Фотографии работ"
        file: "content/gallery.json"
        fields:
          - label: "Работы"
            name: "items"
            widget: "list"
            summary: "{{fields.tag}} — {{fields.src}}"
            fields:
              - label: "Фото"
                name: "src"
                widget: "image"
                media_library:
                  config:
                    multiple: false
              - label: "Категория"
                name: "cat"
                widget: "select"
                options:
                  - { label: "Скалы", value: "скалы" }
                  - { label: "Скульптуры", value: "скульптуры" }
                  - { label: "Павильоны", value: "павильоны" }
                  - { label: "Мебель", value: "мебель" }
                  - { label: "Печи", value: "печи" }
                  - { label: "Фонтаны", value: "фонтаны" }
                  - { label: "Фасады", value: "фасады" }
                  - { label: "Интерьер", value: "интерьер" }
              - label: "Подпись (для карточки)"
                name: "tag"
                widget: "string"
